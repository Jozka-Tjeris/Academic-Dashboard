name: Backend CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Every command below should happen inside the backend folder
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures it gets the shared folder too
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

      - name: Build Shared Package
        run: npm run build -w @internal_package/shared
        working-directory: .

      - name: Run Lint
        run: npm run lint

      - name: Sync Database (Neon)
        run: |
          if [[ "${{ secrets.DATABASE_URL_TEST }}" != *"ep-curly-rice"* ]]; then
            echo "ERROR: DATABASE_URL_TEST does not look like a test database! Safety abort."
            exit 1
          fi
          
          echo "Safe to proceed. Resetting test database..."
          npx prisma db push --force-reset
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

      - name: Run Tests
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          TEST_DATABASE: ${{ secrets.TEST_DATABASE }}
          # Add other secrets here (e.g., JWT_SECRET)
